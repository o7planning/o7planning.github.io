<!DOCTYPE html>
<html>
<head>
  <base href="/flutter-artist/">

  <meta charset="UTF-8">
  <meta content="IE=Edge" http-equiv="X-UA-Compatible">
  <meta name="description" content="Flutter Artist Demo">

  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="flutter_artist_demo">
  <link rel="apple-touch-icon" href="icons/Icon-192.png">

  <link rel="icon" type="image/png" href="favicon.png"/>

  <title>flutter_artist_demo</title>
  <link rel="manifest" href="manifest.json">

  <style>
    #loading {
      position: fixed;
      width: 100%;
      height: 100%;
      background: white;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }

    /* Spinner */
    .spinner {
      width: 50px;
      height: 50px;
      border: 6px solid #ddd;
      border-top: 6px solid #3498db;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }

    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>

<body>
<!-- Loading UI -->
<div id="loading">
  <div class="spinner"></div>
</div>

<script>
  // Khi Flutter load xong thì ẩn loading
  window.addEventListener('flutter-first-frame', function () {
    var loader = document.getElementById('loading');
    if (loader) {
      loader.style.display = 'none';
    }
  });
</script>

<script src="flutter_bootstrap.js" async></script>

<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', function () {
      navigator.serviceWorker.register("firebase-messaging-sw.js")
        .then((registration) => {
          console.log("SW Registered with scope:", registration.scope);
          registration.update();
        });
    });
  }
</script>
</body>
</html>
